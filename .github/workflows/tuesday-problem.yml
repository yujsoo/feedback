name: Tuesday Problem

on:
  schedule:
    - cron: '0 23 * * 1'  # 화요일 오전 8시 KST
  workflow_dispatch:

jobs:
  send-problem:
    runs-on: ubuntu-latest
    steps:
      - name: Send problem to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 << 'PYEOF'
          import os, requests
          from datetime import datetime, timedelta, timezone

          KST = timezone(timedelta(hours=9))
          today = datetime.now(KST)
          start = datetime(2026, 5, 5, tzinfo=KST)
          diff_days = max((today - start).days, 0)
          week = diff_days // 7 + 1

          if week > 24:
              print(f"커리큘럼 완료: {week}주차")
              exit(0)

          deadline = (today + timedelta(days=3)).strftime("%Y년 %-m월 %-d일")

          problems = {
              1: ("React", "useState vs useRef — 언제 무엇을 쓸까?",
                  "아래 두 가지를 각각 구현해보세요.\n\n**① 숫자 카운터**\n버튼 클릭 시 숫자가 화면에 표시되며 증가 → `useState` 사용\n\n**② 렌더링 없는 카운터**\n버튼 클릭 시 콘솔에만 찍히고 화면은 리렌더링 안 됨 → `useRef` 사용\n\n```jsx\nimport { useState, useRef } from 'react';\n\nexport default function App() {\n  // ① useState 카운터 구현\n  // ② useRef 카운터 구현\n}\n```\n\n💬 **같이 적어주세요:** useState와 useRef의 차이를 한 줄로 설명해보세요!"),

              2: ("Vue 3", "ref / reactive / computed 차이 알기",
                  "아래 세 가지를 각각 사용하는 예시를 구현해보세요.\n\n**① ref** — 단순 숫자 카운터\n**② reactive** — 이름 + 나이가 담긴 객체 상태 관리\n**③ computed** — 이름과 나이를 조합한 소개 문장 자동 생성\n\n```vue\n<script setup>\nimport { ref, reactive, computed } from 'vue';\n// 여기에 구현\n</script>\n```\n\n💬 **같이 적어주세요:** ref와 reactive 중 언제 무엇을 쓰는 게 좋을까요?"),

              3: ("React", "useEffect & 라이프사이클 이해하기",
                  "아래 세 가지 케이스를 useEffect로 구현해보세요.\n\n**① 마운트 시 한 번만 실행** — 컴포넌트 진입 시 콘솔에 'Hello!' 출력\n**② 특정 값이 바뀔 때 실행** — input 값이 바뀔 때마다 콘솔에 현재 값 출력\n**③ 언마운트 시 정리** — setInterval 시작 후, 컴포넌트 사라질 때 clearInterval\n\n```jsx\nuseEffect(() => {\n  // 여기에 구현\n  return () => { /* cleanup */ };\n}, [/* dependency */]);\n```"),

              4: ("Vue 3", "watch / watchEffect 차이 알기",
                  "아래 두 가지를 구현하며 차이를 느껴보세요.\n\n**① watch** — 검색어 input이 바뀔 때만 콘솔에 '검색: {값}' 출력\n**② watchEffect** — 페이지 진입 즉시 실행되며, 관련 값이 바뀔 때마다 자동 추적\n\n```vue\n<script setup>\nimport { ref, watch, watchEffect } from 'vue';\n// 여기에 구현\n</script>\n```\n\n💬 **같이 적어주세요:** watch와 watchEffect의 가장 큰 차이점은?"),

              5: ("Next.js", "App Router — SSR / CSR / SSG 차이 이해하기",
                  "Next.js App Router 기준으로 아래 세 가지를 각각 구현해보세요.\n\n**① SSG** — 빌드 시 데이터를 미리 가져오는 정적 페이지\n**② SSR** — 요청 시마다 서버에서 데이터를 가져오는 페이지\n**③ CSR** — 클라이언트에서 useEffect로 데이터를 가져오는 페이지\n\n```tsx\nfetch(url, { cache: 'force-cache' })  // SSG\nfetch(url, { cache: 'no-store' })     // SSR\n```\n\n💬 **같이 적어주세요:** 세 방식 중 어떤 상황에 어떤 걸 써야 할까요?"),

              6: ("React", "커스텀 훅 만들기",
                  "자주 쓰는 로직을 커스텀 훅으로 분리해보세요.\n\n**useLocalStorage** 훅을 만들어주세요.\n- localStorage에 값을 저장/불러오기\n- 새로고침해도 값이 유지됨\n\n```jsx\nfunction useLocalStorage(key, initialValue) {\n  // 여기에 구현\n}\n\n// 사용 예시\nconst [name, setName] = useLocalStorage('name', '');\n```"),

              7: ("Nuxt 3", "useFetch / 라우팅 / 레이아웃",
                  "Nuxt 3에서 아래 세 가지를 구현해보세요.\n\n**① useFetch** — JSONPlaceholder API에서 할 일 목록 가져와서 화면에 표시\n**② 라우팅** — /todos 페이지와 /todos/[id] 상세 페이지 만들기\n**③ 레이아웃** — 모든 페이지에 공통 헤더가 보이는 default 레이아웃 적용\n\n```vue\n<script setup>\nconst { data } = await useFetch('https://jsonplaceholder.typicode.com/todos')\n</script>\n```"),

              8: ("React", "Context API로 전역 상태 관리하기",
                  "Context API를 사용해 다크모드 기능을 구현해보세요.\n\n**① ThemeContext 생성** — 'light' / 'dark' 상태 관리\n**② Provider로 감싸기** — 최상위에서 하위 컴포넌트에 상태 전달\n**③ 버튼으로 토글** — 어떤 컴포넌트에서든 테마 변경 가능\n\n```jsx\nconst ThemeContext = createContext();\n\nexport function ThemeProvider({ children }) {\n  // 여기에 구현\n}\n```"),

              9: ("Vue 3 + Pinia", "Pinia로 상태관리 하기",
                  "Pinia store를 만들어 장바구니 기능을 구현해보세요.\n\n**① store 정의** — 상품 목록, 장바구니 상태, 총 금액(computed)\n**② 액션** — 상품 추가 / 삭제\n**③ 컴포넌트에서 사용** — 상품 목록 페이지 + 장바구니 컴포넌트\n\n```js\nexport const useCartStore = defineStore('cart', () => {\n  const items = ref([])\n  const total = computed(() => items.value.reduce((s, i) => s + i.price, 0))\n})\n```"),

              10: ("React + Zustand", "Zustand로 상태관리 하기",
                   "Zustand store를 만들어 장바구니 기능을 구현해보세요.\n\n**① store 생성** — 상품 목록, 추가/삭제 액션\n**② 컴포넌트에서 사용** — 불필요한 리렌더링 없이 필요한 상태만 구독\n\n```js\nconst useCartStore = create((set) => ({\n  items: [],\n  addItem: (item) => set((state) => ({ items: [...state.items, item] })),\n  removeItem: (id) => set((state) => ({ items: state.items.filter(i => i.id !== id) })),\n}))\n```\n\n💬 **같이 적어주세요:** Context API와 비교했을 때 Zustand의 장점은?"),

              11: ("Next.js", "동적 라우팅 & 미들웨어",
                   "Next.js App Router에서 아래를 구현해보세요.\n\n**① 동적 라우팅** — /blog/[slug] 페이지 만들기 (3개 이상의 포스트)\n**② generateStaticParams** — 빌드 시 경로 미리 생성\n**③ 미들웨어** — /dashboard 접근 시 로그인 안 되어 있으면 /login으로 리다이렉트\n\n```ts\n// middleware.ts\nexport function middleware(request: NextRequest) {\n  // 여기에 구현\n}\n```"),

              12: ("Nuxt 3", "비동기 처리 & 에러 핸들링",
                   "Nuxt 3에서 안정적인 비동기 처리를 구현해보세요.\n\n**① useAsyncData로 데이터 로딩** — 로딩 상태, 에러 상태 표시\n**② error.vue** — 전역 에러 페이지 만들기\n**③ try/catch** — API 실패 시 사용자에게 에러 메시지 표시\n\n```vue\n<script setup>\nconst { data, error, pending } = await useAsyncData('posts',\n  () => $fetch('/api/posts')\n)\n</script>\n```"),

              13: ("Next.js", "React Server Components 이해하기",
                   "Next.js App Router에서 Server Component와 Client Component의 차이를 구현으로 확인해보세요.\n\n**① Server Component** — async/await로 데이터 직접 fetch\n**② Client Component** — 'use client' 선언 후 useState로 인터랙션 처리\n**③ 혼합 사용** — Server Component 안에 Client Component 포함시키기\n\n```tsx\n// ServerPage.tsx\nasync function ServerPage() {\n  const data = await fetch('...');\n  return <ClientButton initialData={data} />;\n}\n\n// ClientButton.tsx\n'use client';\nfunction ClientButton({ initialData }) {\n  const [count, setCount] = useState(0);\n}\n```\n\n💬 **같이 적어주세요:** 어떤 컴포넌트를 Server / Client로 나눠야 할까요?"),

              14: ("Vue 3", "Composables 패턴으로 로직 분리하기",
                   "Vue 3의 Composables를 만들어 로직을 재사용해보세요.\n\n**① useMouse** — 마우스 현재 위치(x, y)를 반환하는 composable\n**② useFetch** — URL을 받아 데이터, 로딩, 에러 상태를 반환하는 composable\n**③ 컴포넌트에서 사용** — 두 composable을 하나의 컴포넌트에서 함께 사용\n\n```js\nexport function useMouse() {\n  const x = ref(0);\n  const y = ref(0);\n  onMounted(() => window.addEventListener('mousemove', e => { x.value = e.x; y.value = e.y; }));\n  return { x, y };\n}\n```"),

              15: ("React + TypeScript", "TypeScript + React 기초",
                   "React 컴포넌트에 TypeScript를 적용해보세요.\n\n**① Props 타입 정의** — interface로 컴포넌트 props 타입 선언\n**② useState 타입** — 제네릭으로 상태 타입 명시\n**③ 이벤트 핸들러 타입** — React.ChangeEvent, React.MouseEvent 사용\n\n```tsx\ninterface CardProps {\n  title: string;\n  description: string;\n  onClick: () => void;\n}\n\nfunction Card({ title, description, onClick }: CardProps) {\n  const [isLiked, setIsLiked] = useState<boolean>(false);\n}\n```\n\n💬 **같이 적어주세요:** TypeScript를 쓰면 어떤 점이 편해졌나요?"),

              16: ("Vue 3 + TypeScript", "TypeScript + Vue 3",
                   "Vue 3 컴포넌트에 TypeScript를 적용해보세요.\n\n**① defineProps 타입** — withDefaults + defineProps로 타입 안전한 props\n**② ref 타입** — Ref<타입>으로 명시적 타입 선언\n**③ emit 타입** — defineEmits로 이벤트 타입 정의\n\n```vue\n<script setup lang=\"ts\">\ninterface Props {\n  title: string;\n  count?: number;\n}\nconst props = withDefaults(defineProps<Props>(), { count: 0 });\nconst emit = defineEmits<{ update: [value: number] }>();\n</script>\n```"),

              17: ("React + TanStack Query", "TanStack Query로 서버 상태 관리",
                   "TanStack Query를 사용해 데이터 페칭을 관리해보세요.\n\n**① useQuery** — 게시글 목록 가져오기 (로딩/에러/성공 상태 처리)\n**② useMutation** — 새 게시글 추가 후 목록 자동 갱신\n**③ 캐싱 확인** — 같은 데이터를 다시 요청할 때 네트워크 탭에서 확인\n\n```tsx\nconst { data, isLoading } = useQuery({\n  queryKey: ['posts'],\n  queryFn: () => fetch('/api/posts').then(r => r.json()),\n});\nconst mutation = useMutation({\n  mutationFn: (post) => fetch('/api/posts', { method: 'POST', body: JSON.stringify(post) }),\n  onSuccess: () => queryClient.invalidateQueries({ queryKey: ['posts'] }),\n});\n```"),

              18: ("Vue 3 + VueUse", "VueUse로 생산성 높이기",
                   "VueUse의 유용한 composable들을 활용해보세요.\n\n**① useLocalStorage** — 다크모드 설정을 localStorage에 자동 저장\n**② useIntersectionObserver** — 요소가 화면에 보일 때 애니메이션 트리거\n**③ useDebounce** — 검색 input에 디바운스 적용 (300ms)\n\n```vue\n<script setup>\nimport { useLocalStorage, useDebounce } from '@vueuse/core';\n\nconst isDark = useLocalStorage('dark-mode', false);\nconst search = ref('');\nconst debouncedSearch = useDebounce(search, 300);\n</script>\n```"),

              19: ("Next.js", "Server Actions & API Routes",
                   "Next.js에서 서버 로직을 처리하는 두 가지 방법을 구현해보세요.\n\n**① API Route** — /api/todos GET/POST 엔드포인트 만들기\n**② Server Action** — form 제출로 DB에 데이터 저장 (API 없이)\n**③ 차이 비교** — 언제 API Route를, 언제 Server Action을 쓰는 게 좋을지 정리\n\n```tsx\nasync function createTodo(formData: FormData) {\n  'use server';\n  const title = formData.get('title');\n  await db.todo.create({ data: { title } });\n}\n```"),

              20: ("Nuxt 3", "Nuxt Server Routes & API",
                   "Nuxt 3에서 서버 API를 만들어보세요.\n\n**① server/api** — GET /api/users, POST /api/users 엔드포인트 구현\n**② $fetch** — 클라이언트에서 만든 API 호출\n**③ useServerFetch** — SSR 환경에서 데이터 페칭\n\n```ts\n// server/api/users.get.ts\nexport default defineEventHandler(async (event) => {\n  return [\n    { id: 1, name: '홍길동' },\n    { id: 2, name: '김철수' },\n  ];\n});\n```"),

              21: ("React + Vitest", "Vitest로 테스트 작성하기",
                   "컴포넌트와 유틸 함수에 테스트를 작성해보세요.\n\n**① 유틸 함수 테스트** — 가격 포맷 함수 (1000 → '1,000원') 테스트\n**② 컴포넌트 테스트** — 버튼 클릭 시 카운터 증가 테스트\n**③ 비동기 테스트** — API 모킹 후 데이터 로딩 테스트\n\n```ts\nimport { describe, it, expect } from 'vitest';\n\ndescribe('formatPrice', () => {\n  it('1000을 1,000원으로 변환한다', () => {\n    expect(formatPrice(1000)).toBe('1,000원');\n  });\n});\n```"),

              22: ("React", "성능 최적화 — 메모이제이션",
                   "불필요한 리렌더링을 막는 최적화 기법을 적용해보세요.\n\n**① React.memo** — props가 바뀌지 않으면 리렌더링 안 되는 컴포넌트\n**② useMemo** — 무거운 계산 결과 캐싱\n**③ useCallback** — 자식 컴포넌트에 넘기는 함수 메모이제이션\n**④ React DevTools Profiler**로 최적화 전/후 비교\n\n```jsx\nconst ExpensiveList = React.memo(({ items }) => { /* ... */ });\nconst filtered = useMemo(() => items.filter(i => i.active), [items]);\nconst handleClick = useCallback((id) => removeItem(id), [removeItem]);\n```\n\n💬 **같이 적어주세요:** 무조건 메모이제이션이 좋을까요? 트레이드오프는?"),

              23: ("React", "접근성(A11y) 적용하기",
                   "웹 접근성을 고려한 컴포넌트를 만들어보세요.\n\n**① 키보드 접근** — Tab, Enter, Escape로 모달 열기/닫기\n**② ARIA 속성** — aria-label, aria-expanded, role 적용\n**③ 스크린리더 테스트** — VoiceOver(Mac)로 읽히는지 확인\n\n```jsx\n<button\n  aria-expanded={isOpen}\n  aria-controls=\"menu\"\n  onClick={() => setIsOpen(!isOpen)}\n>\n  메뉴\n</button>\n<ul id=\"menu\" role=\"menu\" hidden={!isOpen}>\n  ...\n</ul>\n```"),

              24: ("React 또는 Next.js", "포트폴리오 프로젝트 — 기획 & 설계",
                   "24주 멘토링의 마지막 과제입니다! 나만의 포트폴리오 사이트를 기획해보세요.\n\n**제출할 것:**\n**① 사이트 구조** — 어떤 페이지/섹션으로 구성할지\n**② 사용 기술 스택** — 프레임워크, 라이브러리\n**③ 와이어프레임** — 간단한 스케치 or Figma\n**④ 차별점** — 다른 포트폴리오와 다르게 만들 포인트\n\n지금까지 24주 동안 정말 수고 많으셨어요! 🎉"),
          }

          tool, topic, content = problems[week]
          webhook = os.environ["DISCORD_WEBHOOK"]

          payload = {
              "username": "Frontend Mentor",
              "embeds": [{
                  "title": f"📌 {week}주차 화요일 문제 — 개념편",
                  "color": 5814783,
                  "fields": [
                      {"name": "🛠 사용 도구", "value": f"**{tool}** (StackBlitz에서 템플릿 열어서 풀기)"},
                      {"name": f"문제: {topic}", "value": content},
                      {"name": "⏰ 기한", "value": f"**{deadline}** 자정까지\nStackBlitz 링크를 디스코드에 공유해주세요!"},
                  ],
                  "footer": {"text": f"{week}주차 / 화요일 / {tool} | 모르면 언제든 질문하세요 💪"}
              }]
          }

          r = requests.post(webhook, json=payload)
          print(f"Discord 전송 완료: {r.status_code}")
          PYEOF
