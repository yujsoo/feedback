name: Tuesday Problem

on:
  schedule:
    - cron: '0 23 * * 1'  # 화요일 오전 8시 KST (월요일 23:00 UTC)
  workflow_dispatch:

jobs:
  send-problem:
    runs-on: ubuntu-latest
    steps:
      - name: Calculate week and send problem
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          START_DATE="2026-05-06"
          TODAY=$(date +%Y-%m-%d)
          START_SEC=$(date -d "$START_DATE" +%s)
          TODAY_SEC=$(date -d "$TODAY" +%s)
          DIFF_DAYS=$(( (TODAY_SEC - START_SEC) / 86400 ))
          WEEK=$(( DIFF_DAYS / 7 + 1 ))

          if [ $WEEK -lt 1 ] || [ $WEEK -gt 12 ]; then
            echo "커리큘럼 범위 밖입니다. (${WEEK}주차)"
            exit 0
          fi

          DEADLINE=$(date -d "$TODAY + 3 days" +"%Y년 %-m월 %-d일")

          case $WEEK in
            1)  TOPIC="useState vs useRef — 언제 무엇을 쓸까?"
                TOOL="React"
                TOOL_COLOR=5814783
                CONTENT="아래 두 가지를 각각 구현해보세요.\n\n**① 숫자 카운터**\n버튼 클릭 시 숫자가 화면에 표시되며 증가 → \`useState\` 사용\n\n**② 렌더링 없는 카운터**\n버튼 클릭 시 콘솔에만 찍히고 화면은 리렌더링 안 됨 → \`useRef\` 사용\n\n```jsx\nimport { useState, useRef } from 'react';\n\nexport default function App() {\n  // ① useState 카운터 구현\n  // ② useRef 카운터 구현\n}\n```\n\n💬 **같이 적어주세요:** useState와 useRef의 차이를 한 줄로 설명해보세요!"
                ;;
            2)  TOPIC="ref / reactive / computed 차이 알기"
                TOOL="Vue 3"
                TOOL_COLOR=5814783
                CONTENT="아래 세 가지를 각각 사용하는 예시를 구현해보세요.\n\n**① ref** — 단순 숫자 카운터\n**② reactive** — 이름 + 나이가 담긴 객체 상태 관리\n**③ computed** — 이름과 나이를 조합한 소개 문장 자동 생성\n\n```vue\n<script setup>\nimport { ref, reactive, computed } from 'vue';\n// 여기에 구현\n</script>\n```\n\n💬 **같이 적어주세요:** ref와 reactive 중 언제 무엇을 쓰는 게 좋을까요?"
                ;;
            3)  TOPIC="useEffect & 라이프사이클 이해하기"
                TOOL="React"
                TOOL_COLOR=5814783
                CONTENT="아래 세 가지 케이스를 useEffect로 구현해보세요.\n\n**① 마운트 시 한 번만 실행** — 컴포넌트 진입 시 콘솔에 'Hello!' 출력\n**② 특정 값이 바뀔 때 실행** — input 값이 바뀔 때마다 콘솔에 현재 값 출력\n**③ 언마운트 시 정리** — setInterval 시작 후, 컴포넌트 사라질 때 clearInterval\n\n```jsx\nuseEffect(() => {\n  // 여기에 구현\n  return () => {\n    // cleanup\n  };\n}, [/* dependency */]);\n```"
                ;;
            4)  TOPIC="watch / watchEffect 차이 알기"
                TOOL="Vue 3"
                TOOL_COLOR=5814783
                CONTENT="아래 두 가지를 구현하며 차이를 느껴보세요.\n\n**① watch** — 검색어 input이 바뀔 때만 콘솔에 '검색: {값}' 출력\n**② watchEffect** — 페이지 진입 즉시 실행되며, 관련 값이 바뀔 때마다 자동 추적\n\n```vue\n<script setup>\nimport { ref, watch, watchEffect } from 'vue';\n// 여기에 구현\n</script>\n```\n\n💬 **같이 적어주세요:** watch와 watchEffect의 가장 큰 차이점은?"
                ;;
            5)  TOPIC="App Router — SSR / CSR / SSG 차이 이해하기"
                TOOL="Next.js"
                TOOL_COLOR=5814783
                CONTENT="Next.js App Router 기준으로 아래 세 가지를 각각 구현해보세요.\n\n**① SSG** — 빌드 시 데이터를 미리 가져오는 정적 페이지\n**② SSR** — 요청 시마다 서버에서 데이터를 가져오는 페이지\n**③ CSR** — 클라이언트에서 useEffect로 데이터를 가져오는 페이지\n\n```tsx\n// app/page.tsx\n// fetch() 옵션으로 세 가지를 구분해보세요\nfetch(url, { cache: 'force-cache' })    // SSG\nfetch(url, { cache: 'no-store' })       // SSR\n```\n\n💬 **같이 적어주세요:** 세 방식 중 어떤 상황에 어떤 걸 써야 할까요?"
                ;;
            6)  TOPIC="커스텀 훅 만들기"
                TOOL="React"
                TOOL_COLOR=5814783
                CONTENT="자주 쓰는 로직을 커스텀 훅으로 분리해보세요.\n\n**useLocalStorage** 훅을 만들어주세요.\n- localStorage에 값을 저장/불러오기\n- 새로고침해도 값이 유지됨\n\n```jsx\nfunction useLocalStorage(key, initialValue) {\n  // 여기에 구현\n}\n\n// 사용 예시\nconst [name, setName] = useLocalStorage('name', '');\n```"
                ;;
            7)  TOPIC="useFetch / 라우팅 / 레이아웃"
                TOOL="Nuxt 3"
                TOOL_COLOR=5814783
                CONTENT="Nuxt 3에서 아래 세 가지를 구현해보세요.\n\n**① useFetch** — JSONPlaceholder API에서 할 일 목록 가져와서 화면에 표시\n**② 라우팅** — /todos 페이지와 /todos/[id] 상세 페이지 만들기\n**③ 레이아웃** — 모든 페이지에 공통 헤더가 보이는 default 레이아웃 적용\n\n```vue\n<script setup>\nconst { data } = await useFetch('https://jsonplaceholder.typicode.com/todos')\n</script>\n```"
                ;;
            8)  TOPIC="Context API로 전역 상태 관리하기"
                TOOL="React"
                TOOL_COLOR=5814783
                CONTENT="Context API를 사용해 다크모드 기능을 구현해보세요.\n\n**① ThemeContext 생성** — 'light' / 'dark' 상태 관리\n**② Provider로 감싸기** — 최상위에서 하위 컴포넌트에 상태 전달\n**③ 버튼으로 토글** — 어떤 컴포넌트에서든 테마 변경 가능\n\n```jsx\nconst ThemeContext = createContext();\n\nexport function ThemeProvider({ children }) {\n  // 여기에 구현\n}\n```"
                ;;
            9)  TOPIC="Pinia로 상태관리 하기"
                TOOL="Vue 3 + Pinia"
                TOOL_COLOR=5814783
                CONTENT="Pinia store를 만들어 장바구니 기능을 구현해보세요.\n\n**① store 정의** — 상품 목록, 장바구니 상태, 총 금액(computed)\n**② 액션** — 상품 추가 / 삭제\n**③ 컴포넌트에서 사용** — 상품 목록 페이지 + 장바구니 컴포넌트\n\n```js\nexport const useCartStore = defineStore('cart', () => {\n  const items = ref([])\n  const total = computed(() => ...)\n  // 여기에 구현\n})\n```"
                ;;
            10) TOPIC="Zustand로 상태관리 하기"
                TOOL="React + Zustand"
                TOOL_COLOR=5814783
                CONTENT="Zustand store를 만들어 장바구니 기능을 구현해보세요.\n\n**① store 생성** — 상품 목록, 추가/삭제 액션\n**② 컴포넌트에서 사용** — 불필요한 리렌더링 없이 필요한 상태만 구독\n\n```js\nconst useCartStore = create((set) => ({\n  items: [],\n  addItem: (item) => set((state) => ({ ... })),\n  removeItem: (id) => set((state) => ({ ... })),\n}))\n```\n\n💬 **같이 적어주세요:** Context API와 비교했을 때 Zustand의 장점은?"
                ;;
            11) TOPIC="동적 라우팅 & 미들웨어"
                TOOL="Next.js"
                TOOL_COLOR=5814783
                CONTENT="Next.js App Router에서 아래를 구현해보세요.\n\n**① 동적 라우팅** — /blog/[slug] 페이지 만들기 (3개 이상의 포스트)\n**② generateStaticParams** — 빌드 시 경로 미리 생성\n**③ 미들웨어** — /dashboard 접근 시 로그인 안 되어 있으면 /login으로 리다이렉트\n\n```ts\n// middleware.ts\nexport function middleware(request: NextRequest) {\n  // 여기에 구현\n}\n```"
                ;;
            12) TOPIC="비동기 처리 & 에러 핸들링"
                TOOL="Nuxt 3"
                TOOL_COLOR=5814783
                CONTENT="Nuxt 3에서 안정적인 비동기 처리를 구현해보세요.\n\n**① useAsyncData로 데이터 로딩** — 로딩 상태, 에러 상태 표시\n**② error.vue** — 전역 에러 페이지 만들기\n**③ try/catch** — API 실패 시 사용자에게 에러 메시지 표시\n\n```vue\n<script setup>\nconst { data, error, pending } = await useAsyncData('posts', () =>\n  $fetch('/api/posts')\n)\n</script>\n```"
                ;;
          esac

          PAYLOAD=$(cat <<EOF
          {
            "username": "Frontend Mentor",
            "embeds": [{
              "title": "📌 ${WEEK}주차 화요일 문제 — 개념편",
              "color": ${TOOL_COLOR},
              "fields": [
                {
                  "name": "🛠 사용 도구",
                  "value": "**${TOOL}** (StackBlitz에서 템플릿 열어서 풀기)"
                },
                {
                  "name": "문제: ${TOPIC}",
                  "value": "${CONTENT}"
                },
                {
                  "name": "⏰ 기한",
                  "value": "**${DEADLINE}** 자정까지\nStackBlitz 링크를 디스코드에 공유해주세요!"
                }
              ],
              "footer": {
                "text": "${WEEK}주차 / 화요일 / ${TOOL} | 모르면 언제든 질문하세요 💪"
              }
            }]
          }
          EOF
          )

          curl -s -X POST "$DISCORD_WEBHOOK" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD"
