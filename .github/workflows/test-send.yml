name: Test Send

on:
  schedule:
    - cron: '32 7 3 5 *'  # 2026-05-03 07:32 UTC (KST 16:32)
  workflow_dispatch:

jobs:
  send-test:
    runs-on: ubuntu-latest
    steps:
      - name: Send test message to Discord
        env:
          DISCORD_WEBHOOK: ${{ secrets.DISCORD_WEBHOOK }}
        run: |
          python3 << 'PYEOF'
          import os, requests

          webhook = os.environ["DISCORD_WEBHOOK"]
          payload = {
              "username": "Frontend Mentor",
              "embeds": [{
                  "title": "✅ GitHub Actions 테스트 성공!",
                  "color": 3066993,
                  "description": "Claude 앱 없이도 자동으로 Discord 메시지가 전송됐어요!\n\n이제 매주 **화요일 / 금요일 오전 8시**에 자동으로 문제가 옵니다 🎉",
                  "footer": {"text": "GitHub Actions로 자동 전송됨"}
              }]
          }
          r = requests.post(webhook, json=payload)
          print(f"전송 완료: {r.status_code}")
          PYEOF
